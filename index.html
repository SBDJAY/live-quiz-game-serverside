<!DOCTYPE html>
<html>
<head>
<title>Live Quiz Game</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f2f4f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

#app{
    width:400px;
    background:white;
    border-radius:10px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

.option{
    background:#f1f3f6;
}

.option:hover{
    background:#dfe6f0;
}

#startBtn{
    background:#4CAF50;
    color:white;
}

#leaderboard{
    margin-top:20px;
}

.player{
    display:flex;
    justify-content:space-between;
    padding:8px;
    background:#f5f5f5;
    border-radius:6px;
    margin-top:5px;
}

#timer{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div id="app">

<h1>Live Quiz</h1>

<div id="joinScreen">

<input id="username" placeholder="Enter username" style="width:100%;padding:10px;">
<button id="joinBtn">Join Game</button>

</div>


<div id="quizScreen" style="display:none">

<div id="timer">10</div>

<h2 id="question"></h2>

<div id="options"></div>

<button id="startBtn">Start Quiz</button>

</div>


<div id="leaderboard" style="display:none">

<h2>Leaderboard</h2>
<div id="scores"></div>

</div>

</div>

<script>

const socket = new WebSocket("ws://localhost:8080");

let userId = Math.random().toString(36).substring(7);

const joinBtn = document.getElementById("joinBtn");
const startBtn = document.getElementById("startBtn");

const joinScreen = document.getElementById("joinScreen");
const quizScreen = document.getElementById("quizScreen");

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const timerEl = document.getElementById("timer");

const leaderboard = document.getElementById("leaderboard");
const scoresDiv = document.getElementById("scores");


socket.onopen = () => {
    console.log("Connected to server");
};


joinBtn.onclick = () => {

    const username = document.getElementById("username").value;

    socket.send(JSON.stringify({
        type:"join",
        userId:userId,
        username:username
    }));

    joinScreen.style.display="none";
    quizScreen.style.display="block";
};


startBtn.onclick = () => {

    socket.send(JSON.stringify({
        type:"start"
    }));

};


socket.onmessage = (event) => {

    const data = JSON.parse(event.data);

    console.log(data);

    if(data.type === "question"){

        questionEl.innerText = data.question;

        optionsEl.innerHTML="";

        data.options.forEach((option,index)=>{

            const btn = document.createElement("button");

            btn.className="option";

            btn.innerText=option;

            btn.onclick=()=>{

                socket.send(JSON.stringify({
                    type:"answer",
                    userId:userId,
                    answer:index
                }));

            };

            optionsEl.appendChild(btn);

        });

    }

    if(data.type === "timer"){

        timerEl.innerText = "Time: " + data.value;

    }


    if(data.type === "end"){

        quizScreen.style.display="none";
        leaderboard.style.display="block";

        scoresDiv.innerHTML="";

        for(const id in data.scores){

            const div = document.createElement("div");

            div.className="player";

            div.innerHTML = `
                <span>${id}</span>
                <span>${data.scores[id]}</span>
            `;

            scoresDiv.appendChild(div);

        }

    }

};

</script>

</body>
</html>
